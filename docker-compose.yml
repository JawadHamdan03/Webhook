services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  init:
    build: .
    command: sh -c "until pg_isready -h db -U postgres; do echo 'waiting for db'; sleep 1; done; npm run apply-schema && npm run seed"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/webhook
    depends_on:
      - db

  api:
    build: .
    command: npm run dev
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/webhook
      PORT: "5000"
    ports:
      - "5000:5000"
    depends_on:
      init:
        condition: service_completed_successfully

  worker:
    build: .
    command: npm run worker
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/webhook
    depends_on:
      init:
        condition: service_completed_successfully

volumes:
  db_data:
