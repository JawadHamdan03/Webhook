services:
  - type: web
    name: webhook-api
    runtime: node
    rootDir: API
    buildCommand: npm ci
    preDeployCommand: npm run apply-schema
    startCommand: npm run dev
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: webhook-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: worker
    name: webhook-worker
    runtime: node
    rootDir: API
    buildCommand: npm ci
    startCommand: npm run worker
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: webhook-db
          property: connectionString

  - type: web
    name: webhook-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://webhook-api.onrender.com

databases:
  - name: webhook-db
    databaseName: webhook
    user: webhook_user
    plan: free